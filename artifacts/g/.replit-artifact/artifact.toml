kind = "web"
previewPath = "/"
title = "G — Creator Platform"
version = "1.0.0"
id = "artifacts/g"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23345

[services.development]
run = "pnpm --filter @workspace/g run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/g", "run", "build" ]
publicDir = "artifacts/g/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23345"
BASE_PATH = "/"
