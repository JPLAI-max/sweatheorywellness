        type:
          type: string
          enum: [text, photo, video, gif, link]
        caption:
          type: string
        mediaUrl:
          type: string
        thumbnailUrl:
          type: string
        muxPlaybackId:
          type: string
        muxAssetId:
          type: string
        muxUploadId:
          type: string
          description: The Mux upload ID used when uploading the video. Sent at post-creation time so the server can reliably remove the pending-upload tracking record.
        hashtags:
          type: array
          items:
            type: string
        contentRating:
          type: string
          enum: [safe, suggestive, mature, nsfw, explicit]
          default: safe
        visibility:
          type: string
          enum: [public, followers, subscribers_only]
          default: public
        price:
          type: number
        allowDownload:
          type: boolean
        downloadPrice:
          type: number
        embedUrl:
          type: string
        displayAspect:
          type: string
          enum: [auto, "9/16", "1/1", "16/9"]
        trimStart:
          type: number
        trimEnd:
          type: number
        mediaItems:
          type: array
          items:
            type: string
