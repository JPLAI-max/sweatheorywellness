            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUploadResponse"

  /upload/private-url:
    get:
      operationId: getPrivateDownloadUrl
      tags: [upload]
      summary: Get a time-limited download URL for a private file
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Time-limited download URL
          content:
            application/json:
              schema:
                type: object
                required: [downloadUrl]
                properties:
                  downloadUrl:
                    type: string

  /mux/upload-url:
    post:
      operationId: createMuxUploadUrl
      tags: [mux]
      summary: Create a Mux direct upload URL for video posts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileSize]
              properties:
                fileSize:
                  type: number
                  description: File size in bytes (used for quota enforcement)
      responses:
        "200":
          description: Upload URL and upload ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuxUploadInfo"

  /mux/upload/{uploadId}:
    get:
      operationId: getMuxUploadStatus
      tags: [mux]
      summary: Poll status of a Mux direct upload
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload status and playback ID when ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuxUploadStatus"

  /mux/uploads/{uploadId}:
    delete:
      operationId: cancelMuxUpload
      tags: [mux]
      summary: Cancel an in-progress Mux upload and remove its pending record
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "404":
          description: Upload not found or not owned by caller

