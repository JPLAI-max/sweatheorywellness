          enum: [text, photo, video, gif, link]
        caption:
          type: string
        mediaUrl:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        muxPlaybackId:
          type: ["string", "null"]
        embedUrl:
          type: ["string", "null"]
        hashtags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        viewsCount:
          type: integer
        isLiked:
          type: boolean
        isBookmarked:
          type: boolean
        isPinned:
          type: boolean
        contentRating:
          type: string
          enum: [safe, suggestive, mature, nsfw, explicit]
